site_name: AI Engineering Notes
site_url: https://gyanendrachaubey.github.io/AI-Engineering-Notes
site_description: Comprehensive LLM engineering interview preparation guide with detailed answers and code examples
site_author: Gyanendra Chaubey
repo_url: https://github.com/GyanendraChaubey/AI-Engineering-Notes
repo_name: GyanendraChaubey/AI-Engineering-Notes
edit_uri: edit/main/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - glightbox

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: README.md
  - Topics:
    - 01. Prompt Engineering & LLM Basics: docs/01-prompt-engineering/README.md
    - 02. Retrieval Augmented Generation: docs/02-rag/README.md
    - 03. Document Digitization & Chunking: docs/03-chunking/README.md
    - 04. Embedding Models: docs/04-embeddings/README.md
    - 05. Vector Databases: docs/05-vector-databases/README.md
    - 06. Advanced Search Algorithms: docs/06-search-algorithms/README.md
    - 07. Language Models Internal Working: docs/07-language-models/README.md
    - 08. Supervised Fine-Tuning: docs/08-fine-tuning/README.md
    - 09. Preference Alignment (RLHF/DPO): docs/09-preference-alignment/README.md
    - 10. LLM Evaluation: docs/10-evaluation/README.md
    - 11. Hallucination Control: docs/11-hallucination/README.md
    - 12. LLM Deployment & Inference: docs/12-deployment/README.md
    - 13. Agent-Based Systems: docs/13-agents/README.md
    - 14. Prompt Hacking & Security: docs/14-prompt-hacking/README.md
    - 15. Miscellaneous Advanced Topics: docs/15-miscellaneous/README.md
    - 16. Case Studies: docs/16-case-studies/README.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/GyanendraChaubey
